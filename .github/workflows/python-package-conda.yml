name: Rust Market Parser

on:
  schedule:
    - cron: '*/15 * * * *' # Запуск каждые 15 минут
  workflow_dispatch: # Позволяет запускать вручную кнопкой

jobs:
  parse:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Разделяем 5000 предметов на 10 групп по 500 (или 50 по 100)
        # Для примера возьмем 5 групп (0, 100, 200, 300, 400)
        start_index: [0, 100, 200, 300, 400, 500, 600, 700, 800, 900]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Parser
        run: python parser.py ${{ matrix.start_index }}

      - name: Upload result
        uses: actions/upload-artifact@v3
        with:
          name: market-data-${{ matrix.start_index }}
          path: data_${{ matrix.start_index }}.json
